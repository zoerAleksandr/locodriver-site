<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f1722">
    <title>Машинист — приложение для машинистов локомотивов</title>
    <meta name="description" content="Машинист — приложение для машинистов локомотивов: учёт рабочего времени, маршрутов и расчёт зарплаты.">
    <style>
        :root {
            --bg: #0f1722;
            --fg: #e8edf5;
            --muted: #8a96aa;
            --accent: #4f8cff;
            --accent-hover: #6aa1ff;
            --card: #182233;
            --border: #25324a;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 24px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header { text-align: center; margin-bottom: 40px; }
        .logo {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--fg);
        }
        .tagline {
            font-size: 16px;
            color: var(--muted);
            margin-top: 12px;
            line-height: 1.5;
        }
        .cta {
            display: flex;
            justify-content: center;
            margin-top: 32px;
        }
        .cta iframe {
            display: block;
            margin: 0 auto;
        }
        .wip {
            text-align: center;
            margin-top: 48px;
            padding: 32px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
        }
        footer {
            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }
        footer a {
            color: var(--muted);
            text-decoration: underline;
            margin: 0 10px;
        }
        footer a:hover { color: var(--fg); }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f6f8fc;
                --fg: #0f1722;
                --muted: #5a6577;
                --card: #ffffff;
                --border: #e1e6f0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Машинист</div>
            <div class="tagline">Приложение для машинистов локомотивов</div>
            <div class="cta">
                <iframe
                    src="https://www.rustore.ru/external/simple-selection/buttons?theme=coloredDark&orientation=vertical&stores=rustore%3Ahttps%3A%2F%2Fwww.rustore.ru%2Fcatalog%2Fapp%2Fcom.z_company.loco_driver%3Futm_source%3Davailable_in_rustore%26utm_medium%3Dcom.z_company.loco_driver%26rsm%3D1%26mt_link_id%3Diios36%26mt_sub1%3Dcom.z_company.loco_driver"
                    width="200" height="64" frameborder="0" style="border:none;overflow:hidden;"></iframe>
            </div>
        </header>

        <div class="wip">
            Сайт находится в разработке
        </div>

        <footer>
            <div style="margin-bottom:8px">&copy; Машинист</div>
            <a href="https://www.consultant.ru/cons/cgi/online.cgi?req=doc&base=LAW&n=499769&dst=100001#uhadW7VIGL823YPg">Политика конфиденциальности</a>
            <a href="mailto:locodriver.app@yandex.ru?subject=%D0%92%D0%BE%D0%BF%D1%80%D0%BE%D1%81%20%D0%BF%D0%BE%20%D0%BF%D1%80%D0%B8%D0%BB%D0%BE%D0%B6%D0%B5%D0%BD%D0%B8%D1%8E%20%22%D0%9C%D0%B0%D1%88%D0%B8%D0%BD%D0%B8%D1%81%D1%82%22">Поддержка</a>
        </footer>
    </div>
</body>
</html>
