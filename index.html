<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f1722">
    <title>Машинист — приложение для машинистов локомотивов</title>
    <meta name="description" content="Машинист — приложение для машинистов локомотивов: учёт рабочего времени, маршрутов и расчёт зарплаты.">
    <style>
        :root {
            --bg: #0f1722;
            --fg: #e8edf5;
            --muted: #8a96aa;
            --accent: #4f8cff;
            --accent-hover: #6aa1ff;
            --card: #182233;
            --border: #25324a;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 24px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header { text-align: center; margin-bottom: 40px; }
        .logo {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--fg);
        }
        .tagline {
            font-size: 16px;
            color: var(--muted);
            margin-top: 12px;
            line-height: 1.5;
        }
        .cta {
            display: flex;
            justify-content: center;
            margin-top: 32px;
        }
        .rustore-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #000;
            color: #fff;
            text-decoration: none;
            padding: 10px 24px 10px 16px;
            border-radius: 12px;
            border: 1.5px solid #333;
            transition: border-color .15s;
        }
        .rustore-badge:hover { border-color: #555; }
        .rustore-badge svg { width: 32px; height: 32px; flex-shrink: 0; }
        .rustore-badge-text { text-align: left; line-height: 1.2; }
        .rustore-badge-small {
            font-size: 10px;
            letter-spacing: 0.3px;
            opacity: 0.7;
            display: block;
        }
        .rustore-badge-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: block;
        }
        .wip {
            text-align: center;
            margin-top: 48px;
            padding: 32px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
        }
        footer {
            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }
        footer a {
            color: var(--muted);
            text-decoration: underline;
            margin: 0 10px;
        }
        footer a:hover { color: var(--fg); }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f6f8fc;
                --fg: #0f1722;
                --muted: #5a6577;
                --card: #ffffff;
                --border: #e1e6f0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Машинист</div>
            <div class="tagline">Приложение для машинистов локомотивов</div>
            <div class="cta">
                <a class="rustore-badge" href="https://www.rustore.ru/catalog/app/com.z_company.loco_driver">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="32" height="32" rx="7" fill="#0077FF"/>
                        <path d="M8 11.5C8 9.567 9.567 8 11.5 8h3.75c1.933 0 3.5 1.567 3.5 3.5v0c0 1.933-1.567 3.5-3.5 3.5H8V11.5z" fill="#fff"/>
                        <path d="M8 17h7.25c1.933 0 3.5 1.567 3.5 3.5v0c0 1.933-1.567 3.5-3.5 3.5H11.5C9.567 24 8 22.433 8 20.5V17z" fill="#fff" fill-opacity=".6"/>
                        <path d="M15.25 15l8.75 9h-5.5L12 17l3.25-2z" fill="#fff" fill-opacity=".85"/>
                    </svg>
                    <span class="rustore-badge-text">
                        <span class="rustore-badge-small">Доступно в</span>
                        <span class="rustore-badge-name">RuStore</span>
                    </span>
                </a>
            </div>
        </header>

        <div class="wip">
            Сайт находится в разработке
        </div>

        <footer>
            <div style="margin-bottom:8px">&copy; Машинист</div>
            <a href="https://www.consultant.ru/cons/cgi/online.cgi?req=doc&base=LAW&n=499769&dst=100001#uhadW7VIGL823YPg">Политика конфиденциальности</a>
            <a href="mailto:locodriver.app@yandex.ru?subject=%D0%92%D0%BE%D0%BF%D1%80%D0%BE%D1%81%20%D0%BF%D0%BE%20%D0%BF%D1%80%D0%B8%D0%BB%D0%BE%D0%B6%D0%B5%D0%BD%D0%B8%D1%8E%20%22%D0%9C%D0%B0%D1%88%D0%B8%D0%BD%D0%B8%D1%81%D1%82%22">Поддержка</a>
        </footer>
    </div>
</body>
</html>
