<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f1722">
    <meta name="robots" content="noindex">
    <title id="page-title">Страница не найдена</title>
    <style>
        :root {
            --bg: #0f1722;
            --fg: #e8edf5;
            --muted: #8a96aa;
            --accent: #4f8cff;
            --accent-hover: #6aa1ff;
            --card: #182233;
            --border: #25324a;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .logo span { color: var(--accent); }
        h1 {
            font-size: 18px;
            font-weight: 500;
            margin: 24px 0 8px;
        }
        p {
            font-size: 14px;
            color: var(--muted);
            margin: 4px 0;
            line-height: 1.5;
            max-width: 360px;
        }
        .spinner {
            margin: 24px auto;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fallback {
            display: none;
            margin-top: 32px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px 20px;
            max-width: 400px;
            width: 100%;
        }
        .fallback.show { display: block; }
        .fallback h2 {
            font-size: 16px;
            margin: 0 0 8px;
            color: var(--fg);
        }
        .fallback p { color: var(--muted); margin-bottom: 16px; }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            margin: 6px 4px;
            transition: background .15s;
        }
        .btn:hover, .btn:active { background: var(--accent-hover); }
        .btn.secondary {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
        }
        .footer {
            margin-top: auto;
            padding-top: 32px;
            font-size: 12px;
            color: var(--muted);
        }
        .footer a { color: var(--muted); text-decoration: underline; }
        /* 404 mode */
        .not-found { display: none; }
        .not-found.show { display: block; }
        .share-mode { display: block; }
        .share-mode.hide { display: none; }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f6f8fc;
                --fg: #0f1722;
                --muted: #5a6577;
                --card: #ffffff;
                --border: #e1e6f0;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">Loco<span>Driver</span></div>

        <!-- Share redirect mode -->
        <div class="share-mode" id="share-mode">
            <div class="spinner"></div>
            <h1>Открываем маршрут…</h1>
            <p id="hint">Если приложение установлено, оно откроется автоматически.</p>

            <div class="fallback" id="fallback">
                <h2>Приложение не открылось?</h2>
                <p>Установите LocoDriver, чтобы открывать маршруты по ссылке.</p>
                <a class="btn" href="https://www.rustore.ru/catalog/app/com.z_company.loco_driver">
                    Скачать в RuStore
                </a>
                <br>
                <a class="btn secondary" id="btn-retry" href="#">Попробовать снова</a>
            </div>
        </div>

        <!-- 404 mode -->
        <div class="not-found" id="not-found">
            <h1>Страница не найдена</h1>
            <p>Запрошенная страница не существует.</p>
            <a class="btn" href="/">На главную</a>
        </div>

        <div class="footer">
            <a href="/">На главную</a>
        </div>
    </div>

    <script>
        (function () {
            var path = window.location.pathname.replace(/\/+$/, '');
            var segments = path.split('/').filter(Boolean);

            // Проверяем, что URL начинается с /r/ — это share deep link.
            // Если нет — показываем обычную 404 страницу.
            var rIdx = segments.indexOf('r');
            if (rIdx < 0 || segments.length <= rIdx + 1) {
                // Не share-ссылка → показываем 404
                document.getElementById('share-mode').className = 'share-mode hide';
                document.getElementById('not-found').className = 'not-found show';
                return;
            }

            // Share mode — извлекаем id
            document.getElementById('page-title').textContent = 'Открываем маршрут в LocoDriver…';
            var shareId = segments[rIdx + 1].split('?')[0].split('#')[0];

            if (!shareId) {
                document.getElementById('hint').textContent = 'Ссылка повреждена.';
                document.getElementById('fallback').className = 'fallback show';
                return;
            }

            var deepLink = 'locodriver://share/' + encodeURIComponent(shareId);
            var retryBtn = document.getElementById('btn-retry');
            retryBtn.href = deepLink;
            retryBtn.addEventListener('click', function (e) {
                e.preventDefault();
                window.location.href = deepLink;
            });

            // Попытка открыть приложение через кастомную схему.
            try {
                window.location.replace(deepLink);
            } catch (_) {}

            // Через 1.5 секунды показываем fallback.
            setTimeout(function () {
                document.getElementById('fallback').className = 'fallback show';
            }, 1500);
        })();
    </script>
</body>
</html>
